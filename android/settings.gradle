pluginManagement {
  includeBuild("../node_modules/@react-native/gradle-plugin")
}

plugins {
  id("com.facebook.react.settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  ex.autolinkLibrariesFromCommand()
}

rootProject.name = 'Faculty Mate'

dependencyResolutionManagement {
  repositories {
    google()
    mavenCentral()
  }
  versionCatalogs {
    reactNative {
      from(files("../node_modules/react-native/gradle/libs.versions.toml"))
    }
  }
}

def expoPath = new File(
  providers.exec {
    workingDir(rootDir)
    commandLine("node", "--print", "require.resolve('expo/package.json')")
  }.standardOutput.asText.get().trim()
).getParentFile().absolutePath

apply from: new File(expoPath, "scripts/autolinking.gradle")
useExpoModules()

include ':app'
